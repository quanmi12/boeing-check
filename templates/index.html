<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Boeing VIP Checker</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #020617, #000);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    text-align: center;
    color: #38bdf8;
    font-size: 40px;
    margin-top: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.money {
    font-size: 50px;
    color: #22c55e;
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 15px;
    overflow: hidden;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 12px 15px;
}

.row:hover {
    background: rgba(255,255,255,0.03);
}

.price {
    color: #22c55e;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- MONEY -->
    <h1>💰 MONEY</h1>
    <div class="money">${{ "%.2f"|format(total or 0) }}</div>

    <!-- GAME -->
    <div class="card">

        <!-- HEADER -->
        <div class="row">
            <div><b>🎮 Game A</b></div>
            <div class="price">${{ "%.2f"|format(total or 0) }}</div>
        </div>

        <!-- LIST -->
        {% for game, d in result.items() %}
        <div class="row">
            <div>{{ game }}</div>
            <div class="price">${{ "%.2f"|format(d["price"]) }}</div>
        </div>
        {% endfor %}

    </div>

</div>

<!-- AUTO RELOAD -->
<script>
setInterval(() => {
    window.location.reload();
}, 10000);
</script>

</body>
</html>
