<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money App</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: -apple-system, Arial;
    margin: 0;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 15px;
}

.title {
    font-size: 26px;
    color: #38bdf8;
    font-weight: 600;
}

.money {
    font-size: 48px;
    color: #22c55e;
    margin: 12px 0;
    font-weight: 700;
}

/* DATE */
.date-box {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
}

.date-box input,
.date-box select,
.date-box button {
    padding: 14px 18px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: white;
}

.date-box button {
    background: #38bdf8;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

/* GROUP */
.group {
    background: #0f172a;
    border-radius: 16px;
    margin-bottom: 15px;
    overflow: hidden;
    border: 1px solid #1e293b;
}

.group-header {
    display: flex;
    justify-content: space-between;
    padding: 18px;
    cursor: pointer;
}

.total {
    color: #22c55e;
    font-weight: bold;
}

/* DETAIL */
.detail {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
}

.group.active .detail {
    max-height: 500px;
}

/* ITEM */
.item {
    display: flex;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid #1e293b;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">💰 MONEY</div>
    <div class="money">$0.00</div>

    <div class="date-box">
        <input type="date">
        <select>
            <option>Theo ngày</option>
            <option>Theo tuần</option>
        </select>
        <button onclick="reloadPage()">Xem</button>
    </div>
</div>

<div class="container">

    <!-- GROUP -->
    <div class="group">
        <div class="group-header" onclick="toggle(this)">
            <div>🎮 Game A</div>
            <div class="total">$0.00</div>
        </div>

        <div class="detail">
            <div class="item">
                <div>Demon Flying</div>
                <div>$1.07</div>
            </div>
            <div class="item">
                <div>Note App</div>
                <div>$1.00</div>
            </div>
            <div class="item">
                <div>Elf Land Adventure</div>
                <div>$4.31</div>
            </div>
            <div class="item">
                <div>Magical Adventure</div>
                <div>$4.27</div>
            </div>
        </div>
    </div>

</div>

<script>
// accordion chỉ mở 1 cái
function toggle(el) {
    const all = document.querySelectorAll(".group");

    all.forEach(g => {
        if (g !== el.parentElement) {
            g.classList.remove("active");
        }
    });

    el.parentElement.classList.toggle("active");
}

// tính tổng tiền
function updateTotal() {
    let total = 0;

    document.querySelectorAll(".item div:last-child").forEach(el => {
        let value = parseFloat(el.innerText.replace("$", ""));
        total += value;
    });

    document.querySelector(".money").innerText = "$" + total.toFixed(2);

    document.querySelectorAll(".group").forEach(group => {
        let groupTotal = 0;

        group.querySelectorAll(".item div:last-child").forEach(el => {
            let value = parseFloat(el.innerText.replace("$", ""));
            groupTotal += value;
        });

        group.querySelector(".total").innerText = "$" + groupTotal.toFixed(2);
    });
}

// reload
function reloadPage() {
    location.reload();
}

// chạy khi load
updateTotal();
</script>

</body>
</html>
