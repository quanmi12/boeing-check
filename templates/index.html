<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Dashboard</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: -apple-system, Arial;
    margin: 0;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 15px;
}

.money {
    font-size: 48px;
    color: #22c55e;
    font-weight: bold;
}

/* DATE */
.date-box {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
}

.date-box input,
.date-box button {
    padding: 14px 18px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
}

.date-box button {
    background: #38bdf8;
    color: white;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

/* GROUP */
.group {
    background: #0f172a;
    border-radius: 16px;
    margin-bottom: 15px;
    overflow: hidden;
    border: 1px solid #1e293b;
}

.group-header {
    display: flex;
    justify-content: space-between;
    padding: 18px;
    cursor: pointer;
}

.total {
    color: #22c55e;
    font-weight: bold;
}

/* DETAIL */
.detail {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
}

.group.active .detail {
    max-height: 500px;
}

/* ITEM */
.item {
    display: flex;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid #1e293b;
}
</style>
</head>

<body>

<div class="header">
    <div class="money" id="totalMoney">$0.00</div>

    <div class="date-box">
        <input type="date">
        <button onclick="reloadPage()">Xem</button>
    </div>
</div>

<div class="container">

    <div class="group">
        <div class="group-header" onclick="toggle(this)">
            <div>🎮 Tổng Game</div>
            <div class="total" id="groupTotal">$0.00</div>
        </div>

        <div class="detail" id="gameList"></div>
    </div>

</div>

<script>
// chỉ mở 1 accordion
function toggle(el) {
    const all = document.querySelectorAll(".group");

    all.forEach(g => {
        if (g !== el.parentElement) {
            g.classList.remove("active");
        }
    });

    el.parentElement.classList.toggle("active");
}

// load data realtime
async function loadData() {
    const res = await fetch("/api/data");
    const data = await res.json();

    let html = "";
    let total = 0;

    data.forEach(g => {
        total += g.money;

        html += `
        <div class="item">
            <div>${g.name}</div>
            <div>$${g.money.toFixed(2)}</div>
        </div>`;
    });

    document.getElementById("gameList").innerHTML = html;
    document.getElementById("totalMoney").innerText = "$" + total.toFixed(2);
    document.getElementById("groupTotal").innerText = "$" + total.toFixed(2);
}

// reload
function reloadPage() {
    location.reload();
}

// chạy lần đầu + realtime mỗi 3s
loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
