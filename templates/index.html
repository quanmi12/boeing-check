<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MEO MEO</title>

<!-- FLATPICKR -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
    margin: 0;
    background: #020617;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.box {
    background: #0f172a;
    border-radius: 12px;
    padding: 20px;
}

.money {
    text-align: right;
    font-size: 28px;
    color: #22c55e;
    font-weight: bold;
}

.name {
    font-size: 38px;
    margin-bottom: 10px;
}

.game-main span {
    color: #ef4444;
    font-weight: bold;
}

button {
    background: #22c55e;
    border: none;
    padding: 12px 16px;
    border-radius: 50px;
    cursor: pointer;
}

.detail {
    display: none;
    margin-top: 15px;
}

.item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 14px;
}

input {
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-right: 10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- FILTER -->
    <form method="get" style="margin-bottom:15px;">
        <input type="date" name="start_date" value="{{ start_date }}">
        <input id="start_time" name="start_time" value="{{ start_time }}">
        
        <input type="date" name="end_date" value="{{ end_date }}">
        <input id="end_time" name="end_time" value="{{ end_time }}">

        <button type="submit">Làm mới</button>
    </form>

    <!-- BOX -->
    <div class="box">

        <div style="display:flex; justify-content:space-between;">
            <div>
                <div class="name">Bảng Phong Thần </div>

                {% if result %}
                {% set first_game = result.keys()|list|first %}
                <div>
                    {{ first_game }}<br>
                    <span>${{ "%.2f"|format(result[first_game]["price"]) }}</span>
                </div>
                {% endif %}

                <button onclick="toggleDetail()">Xem chi tiết</button>
            </div>

            <div class="money">
                ${{ "%.2f"|format(total or 0) }}
            </div>
        </div>

        <!-- DETAIL -->
        <div class="detail" id="detailBox">
            {% for game, d in result.items() %}
            <div class="item">
                <div>{{ game }}</div>
                <div>${{ "%.2f"|format(d["price"]) }}</div>
            </div>
            {% endfor %}
        </div>

    </div>

</div>

<script>
// TIME PICKER 24H
flatpickr("#start_time", {
    enableTime: true,
    noCalendar: true,
    dateFormat: "H:i:S",
    time_24hr: true
});

flatpickr("#end_time", {
    enableTime: true,
    noCalendar: true,
    dateFormat: "H:i:S",
    time_24hr: true
});

function toggleDetail() {
    let box = document.getElementById("detailBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
