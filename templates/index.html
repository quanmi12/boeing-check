<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Boeing VIP Checker</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #000);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 40px;
            margin-top: 20px;
        }

        h2 {
            margin: 30px 20px 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
        }

        .row:hover {
            background: rgba(255,255,255,0.03);
        }

        .price {
            color: #22c55e;
            font-weight: bold;
        }

        .money {
            font-size: 50px;
            color: #22c55e;
            text-align: center;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        input, select {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            margin-right: 5px;
            font-size: 15px;
        }

        .list {
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- MONEY -->
    <h1>💰 MONEY</h1>
    <div class="money">${{ "%.2f"|format(total or 0) }}</div>

    <!-- FILTER -->
    <div style="text-align:center; margin-bottom:20px;">
        <form method="get">
            <input type="date" name="date" value="{{ selected_date }}">
            
            <select name="mode">
                <option value="day" {% if mode=='day' %}selected{% endif %}>Theo ngày</option>
                <option value="month" {% if mode=='month' %}selected{% endif %}>Cả tháng</option>
            </select>

            <button type="submit">Xem</button>
        </form>
    </div>

    <!-- GAME -->
    <h2>🎮 GAME</h2>

    <div class="card">

        <!-- HEADER -->
        <div class="row">
            <div><b>🎮 Game A</b></div>
            <div class="price">${{ "%.2f"|format(total or 0) }}</div>
        </div>

        <!-- LIST -->
        <div class="list">
            {% for game, money in result.items() %}
            <div class="row item">
                <div>{{ game }}</div>
                <div class="price">${{ "%.2f"|format(money) }}</div>
            </div>
            {% endfor %}
        </div>

    </div>

</div>

<!-- AUTO RELOAD -->
<script>
setInterval(() => {
    window.location.reload();
}, 10000);
</script>

</body>
</html>
