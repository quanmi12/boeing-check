<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money App</title>

<style>
body {
    background: linear-gradient(180deg, #020617, #020617);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
    margin: 0;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 15px;
}

.title {
    font-size: 26px;
    color: #38bdf8;
    font-weight: 600;
}

.money {
    font-size: 48px;
    color: #22c55e;
    margin: 12px 0;
    font-weight: 700;
}

/* DATE BOX - kiểu iOS */
.date-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

.date-box input,
.date-box select,
.date-box button {
    padding: 14px 16px;
    font-size: 16px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
    backdrop-filter: blur(10px);
}

/* button */
.date-box button {
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    font-weight: 600;
}

/* container */
.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

/* group */
.group {
    background: rgba(15,23,42,0.7);
    border-radius: 18px;
    margin-bottom: 15px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
}

/* header row */
.group-header {
    display: flex;
    justify-content: space-between;
    padding: 18px;
    cursor: pointer;
    font-size: 16px;
}

.total {
    color: #22c55e;
    font-weight: 600;
}

/* dropdown */
.detail {
    max-height: 0;
    overflow: hidden;
    transition: all 0.3s ease;
}

/* active */
.group.active .detail {
    max-height: 500px;
}

/* item */
.item {
    display: flex;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 15px;
}

/* hover effect mobile feel */
.group-header:active {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="header">
    <div class="title">💰 MONEY</div>
    <div class="money">$10.65</div>

    <div class="date-box">
        <input type="date">
        <select>
            <option>Theo ngày</option>
            <option>Theo Tháng   
            </option>
        </select>
        <button onclick="reloadPage()">Xem</button>
    </div>
</div>

<div class="container">

    <div class="group">
        <div class="group-header" onclick="toggle(this)">
            <div>🎮 Tổng Game</div>
            <div class="total">$10.65</div>
        </div>

        <div class="detail">
            <div class="item">
                <div>Demon Flying</div>
                <div>$1.07</div>
            </div>
            <div class="item">
                <div>Note App</div>
                <div>$1.00</div>
            </div>
            <div class="item">
                <div>Elf Land Adventure</div>
                <div>$4.31</div>
            </div>
            <div class="item">
                <div>Magical Adventure</div>
                <div>$4.27</div>
            </div>
        </div>
    </div>

</div>

<script>
function toggle(el) {
    const all = document.querySelectorAll(".group");

    all.forEach(g => {
        if (g !== el.parentElement) {
            g.classList.remove("active");
        }
    });

    el.parentElement.classList.toggle("active");
}

function reloadPage() {
    location.reload();
}
</script>

</body>
</html>
